<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Shaan's social profile and links." />
    <meta name="theme-color" content="#050505" />
    <title>Shaan</title>
    <link rel="icon" type="image/jpeg" href="pfp.jpg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="is-locked">
    <div class="background" aria-hidden="true">
      <img src="pfp.jpg" alt="" class="background-image" />
      <div class="noise"></div>
      <div class="glow glow-one"></div>
      <div class="glow glow-two"></div>
    </div>

    <button
      id="enter-screen"
      class="enter-screen"
      type="button"
      aria-label="Enter profile"
      onclick="document.body.classList.remove('is-locked');document.body.classList.add('has-entered');"
    >
      <span class="enter-title">click to enter</span>
      <span class="enter-subtitle">@newbbd</span>
    </button>

    <main class="profile-shell" aria-label="Shaan social profile">
      <section class="profile-card">
        <div class="avatar-wrap">
          <img src="pfp.jpg" alt="Shaan profile picture" class="avatar" />
        </div>

        <p class="handle">@newbbd</p>
        <h1>Shaan</h1>
        <p class="bio">links, socials, and whatever I am on</p>

        <div class="status-row" aria-label="Discord status">
          <span class="status-dot is-online" aria-hidden="true"></span>
          <span>online</span>
          <span class="status-divider">/</span>
          <span>@sh44nz</span>
        </div>

        <div class="social-grid" aria-label="Social links">
          <a class="social-card" href="https://github.com/newbbd" target="_blank" rel="noreferrer">
            <span class="social-icon">GH</span>
            <span>
              <strong>GitHub</strong>
              <small>@newbbd</small>
            </span>
          </a>

          <a class="social-card" href="https://www.roblox.com/users/4607785415/profile" target="_blank" rel="noreferrer">
            <span class="social-icon">RB</span>
            <span>
              <strong>Roblox</strong>
              <small>Profile</small>
            </span>
          </a>

          <a class="social-card" href="https://steamcommunity.com/profiles/76561198763811803/" target="_blank" rel="noreferrer">
            <span class="social-icon">ST</span>
            <span>
              <strong>Steam</strong>
              <small>super.ark81</small>
            </span>
          </a>

          <a class="social-card" href="https://www.xbox.com/en-US/play/user/brreezii" target="_blank" rel="noreferrer">
            <span class="social-icon">XB</span>
            <span>
              <strong>Xbox</strong>
              <small>brreezii</small>
            </span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
